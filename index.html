<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PandoX</title>
  <script src="https://cdn.jsdelivr.net/npm/@worldcoin/minikit-js@latest/dist/index.global.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --neon-blue: #00f0ff;
      --gold: #ffd700;
      --purple: #c724ff;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(135deg, #00081f 0%, #001133 100%);
      color: #e0f8ff;
      min-height: 100vh;
      padding: 20px;
    }
    .header { text-align:center; margin:40px 0 50px; }
    .logo {
      width: 260px; height: 260px;
      border-radius: 50%;
      border: 16px double var(--neon-blue);
      box-shadow: 0 0 100px rgba(0,240,255,0.95);
    }
    h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 3.8em;
      background: linear-gradient(90deg, var(--neon-blue), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .tagline { font-size:1.7em; color:#a0f0ff; margin-bottom:60px; }
    .card {
      background: rgba(5,25,60,0.96);
      border: 2px solid var(--neon-blue);
      border-radius: 30px;
      padding: 40px 30px;
      margin: 35px 0;
      box-shadow: 0 25px 80px rgba(0,240,255,0.35);
    }
    .btn {
      background: linear-gradient(135deg, var(--neon-blue), var(--purple));
      color:#000; border:none; padding:24px;
      border-radius:60px; font-size:1.6em; font-weight:700;
      width:100%; margin:18px 0;
      box-shadow:0 18px 60px rgba(0,240,255,0.5);
    }
    #gameCanvas {
      width: 100%;
      height: 420px; /* Más ancho y con mejor proporción */
      background: linear-gradient(#001122, #0a1f3a);
      border: 7px solid var(--neon-blue);
      border-radius: 28px;
      margin-top: 25px;
      box-shadow: 0 0 85px rgba(0,240,255,0.9);
    }
  </style>
</head>
<body>

  <div class="header">
    <img src="https://raw.githubusercontent.com/pandoxofficial12-dev/PandoX-Earn-Official-/main/logo-pandox.png" alt="PandoX" class="logo">
    <h1>PandoX</h1>
    <p class="tagline">Reclama • Compite • Gana PDX en el espacio</p>
  </div>

  <div class="card">
    <button id="connectBtn" class="btn">Conectar Wallet</button>
    <button id="claimBtn" class="btn" disabled>Reclamar PDX</button>
  </div>

  <div class="card">
    <p style="text-align:center;font-size:17px;line-height:1.9;color:var(--neon-blue);">
      🏆 Todos los domingos 8:00 PM (UTC-5)<br><br>
      Ranking Puntos PDX: 1° 80.000 • 2° 40.000 • 3° 25.000 PDX<br>
      Ranking Panda Runner: 1° 400.000 • 2° 200.000 • 3° 80.000 PDX<br><br>
      <strong>Mínimo 50 entradas pagadas</strong>
    </p>
  </div>

  <div class="card">
    <h2 style="text-align:center;color:var(--neon-blue);margin-bottom:25px;">🐼 Panda Runner</h2>
    <div style="display:flex;gap:20px;justify-content:center;margin-bottom:25px;">
      <button id="practiceBtn" class="btn" style="flex:1;">Practicar Gratis</button>
      <button id="paidBtn" class="btn" style="flex:1;">Competir (0.5 WLD)</button>
    </div>
    <canvas id="gameCanvas"></canvas>
    <p id="score" style="text-align:center;margin-top:15px;font-size:2.5em;color:var(--neon-blue);">Score: 0</p>
  </div>

<script>
// Wallet
let walletAddress = '';
document.getElementById('connectBtn').addEventListener('click', async () => {
  if (typeof MiniKit === 'undefined') return alert('Abre en World App');
  try {
    const { finalPayload } = await MiniKit.commandsAsync.walletAuth({ nonce: Math.random().toString(36) });
    if (finalPayload.status === 'success') {
      walletAddress = MiniKit.walletAddress;
      document.getElementById('connectBtn').style.display = 'none';
      document.getElementById('claimBtn').disabled = false;
      alert('✅ Wallet conectada');
    }
  } catch(e) { alert('Error conectando wallet'); }
});
document.getElementById('claimBtn').addEventListener('click', () => alert('¡PDX reclamado!'));

// Juego optimizado - más espacio y panda pequeño
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width = canvas.offsetWidth || 400;
  canvas.height = 420;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

let player = { x: 75, y: 260, w: 62, h: 62, vy: 0, gravity: 0.78, jumpPower: -19.2, onGround: true };
let obstacles = [], coins = [], score = 0, running = false;

const pandaImg = new Image();
pandaImg.src = 'https://raw.githubusercontent.com/pandoxofficial12-dev/PandoX-Earn-Official-/main/logo-pandox.png';

function startGame(paid) {
  if (paid && !walletAddress) return alert('Conecta tu wallet primero');
  running = true;
  score = 0;
  player.y = 260; player.vy = 0; player.onGround = true;
  obstacles = []; coins = [];
  document.getElementById('score').textContent = 'Score: 0';
  animateGame();
}

function animateGame() {
  if (!running) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Fondo espacio
  ctx.fillStyle = '#001122';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Estrellas
  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  for (let i = 0; i < 45; i++) {
    const x = (i * 27) % canvas.width;
    const y = (i * 18) % 320;
    ctx.fillRect(x, y, 2, 2);
  }

  // Panda más pequeño y bien ubicado
  if (pandaImg.complete) ctx.drawImage(pandaImg, player.x, player.y, player.w, player.h);
  else {
    ctx.fillStyle = '#00f0ff';
    ctx.fillRect(player.x, player.y, player.w, player.h);
  }

  // Suelo
  ctx.fillStyle = '#112244';
  ctx.fillRect(0, 330, canvas.width, 90);

  // Obstáculos - aparecen más lejos para dar tiempo
  if (Math.random() < 0.021) obstacles.push({x: canvas.width + 90, y: 260, w: 46, h: 70});
  for (let i = obstacles.length-1; i >= 0; i--) {
    let o = obstacles[i];
    o.x -= 6.9;
    ctx.fillStyle = '#ff3366';
    ctx.fillRect(o.x, o.y, o.w, o.h);
    if (o.x < player.x + player.w && o.x + o.w > player.x && o.y < player.y + player.h && o.y + o.h > player.y) {
      running = false;
      alert(`¡Game Over! Score: ${score}`);
      return;
    }
    if (o.x < -60) obstacles.splice(i,1);
  }

  // Monedas
  if (Math.random() < 0.037) coins.push({x: canvas.width + 60, y: 130 + Math.random()*160});
  for (let i = coins.length-1; i >= 0; i--) {
    let c = coins[i];
    c.x -= 6.9;
    ctx.fillStyle = '#ffd700';
    ctx.beginPath(); ctx.arc(c.x, c.y, 16, 0, Math.PI*2); ctx.fill();
    if (Math.hypot(c.x - (player.x + 31), c.y - (player.y + 31)) < 45) {
      score += 50;
      coins.splice(i,1);
    }
    if (c.x < -40) coins.splice(i,1);
  }

  // Física
  player.vy += player.gravity;
  player.y += player.vy;
  if (player.y >= 260) {
    player.y = 260;
    player.vy = 0;
    player.onGround = true;
  } else player.onGround = false;

  score += 1;
  document.getElementById('score').innerHTML = `Score: <span style="color:#00f0ff">${score}</span>`;

  requestAnimationFrame(animateGame);
}

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (running && player.onGround) {
    player.vy = player.jumpPower;
    player.onGround = false;
  }
}, { passive: false });

document.getElementById('practiceBtn').addEventListener('click', () => startGame(false));
document.getElementById('paidBtn').addEventListener('click', () => startGame(true));
</script>
</body>
</html>
