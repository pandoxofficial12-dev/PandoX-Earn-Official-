<html lang="es">
<head>

  <style>
    :root {
      --neon-blue: #00f0ff;
      --gold-premium: #ffd700;
      --gold-dark: #d4af37;
      --bg-dark: #000022;
      --card-bg: rgba(5, 5, 40, 0.92);
      --text-light: #f0faff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(135deg, var(--bg-dark) 0%, #000055 100%);
      color: var(--text-light);
      min-height: 100vh;
      padding: 15px;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?auto=format&fit=crop&w=2000&q=80') center/cover;
      opacity: 0.16;
      z-index: -2;
    }

    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      opacity: 0;
      animation: particleFloat 60s infinite linear;
      box-shadow: 0 0 30px;
    }

    .particle.gold { background: var(--gold-premium); box-shadow: 0 0 30px var(--gold-premium); }
    .particle.neon { background: var(--neon-blue); box-shadow: 0 0 30px var(--neon-blue); }

    @keyframes particleFloat {
      0% { transform: translateY(180vh) scale(0.05) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-100vh) scale(0.4) rotate(2160deg); opacity: 0; }
    }

    .logo-container {
      text-align: center;
      margin: 30px 0 50px;
    }

    .logo {
      width: 260px;
      height: 260px;
      border-radius: 50%;
      border: 14px double var(--gold-premium);
      box-shadow: 0 0 120px var(--gold-premium), inset 0 0 60px var(--neon-blue);
      animation: logoPulse 6s infinite alternate;
    }

    @keyframes logoPulse {
      from { transform: scale(1); box-shadow: 0 0 120px var(--gold-premium); }
      to { transform: scale(1.04); box-shadow: 0 0 160px var(--neon-blue); }
    }

    h1 {

      font-size: 3.8em;
      background: linear-gradient(90deg, var(--gold-premium), var(--neon-blue), var(--gold-premium));

      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 40px rgba(255, 215, 0, 0.8);
      margin: 20px 0 30px;
      letter-spacing: 6px;
      text-align: center;
    }

    .subtitle {

    .section {

      padding: 40px 25px;
      margin: 40px 0;

    .section:hover {

    .social-btn, .earn-btn, #copyReferralBtn, #shareXBtn {

      transition: all 0.4s ease;
      position: relative;
      overflow: hidden;

    .social-btn::after, .earn-btn::after, #copyReferralBtn::after, #shareXBtn::after {

      top: 50%; left: 50%;

      font-size: 1.4em;
    }

    #status {

    #referralSection {

    #referralInput {

    #copyReferralBtn, #shareXBtn {

    .rank-card:nth-child(3) { animation-delay: 1.2s; }

    @keyframes fadeInUp {

<script>
// Partículas doradas y neón
function createParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 100; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    if (i % 3 === 0) particle.classList.add('neon');
    const size = Math.random() * 6 + 2;
    particle.style.width = particle.style.height = size + 'px';
    particle.style.left = Math.random() * 100 + 'vw';
    particle.style.animationDelay = Math.random() * 30 + 's';
    particle.style.animationDuration = Math.random() * 50 + 50 + 's';
    container.appendChild(particle);
  }
}
createParticles();

// Confeti al reclamar
function launchConfetti() {
  const canvas = document.getElementById('confetti');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const particles = [];
  for (let i = 0; i < 300; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height - canvas.height,
      size: Math.random() * 12 + 6,
      speed: Math.random() * 8 + 4,
      rotation: Math.random() * 2160,
      color: ['#FFD700', '#FFEA00', '#00f0ff', '#FFFFFF', '#FFFF99'][Math.floor(Math.random() * 5)]
    });
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation * Math.PI / 180);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = 0.9;
      ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
      ctx.restore();

      p.y += p.speed;
      p.rotation += 8;
      if (p.y > canvas.height) p.y = -p.size * 2;
    });
    requestAnimationFrame(animate);
  }
  animate();

  setTimeout(() => { canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height); }, 8000);
}
