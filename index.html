<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PandoX</title>
  <script src="https://cdn.jsdelivr.net/npm/@worldcoin/minikit-js@latest/dist/index.global.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --neon-blue: #00f0ff;
      --dark-space: #00081f;
      --accent: #00bbff;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(135deg, #00081f 0%, #001122 100%);
      color: #e0f8ff;
      min-height: 100vh;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 30% 20%, rgba(0,240,255,0.18) 0%, transparent 65%),
                  radial-gradient(circle at 70% 80%, rgba(0,240,255,0.12) 0%, transparent 65%);
      z-index: -1;
    }
    .header {
      text-align: center;
      margin: 40px 0 50px;
    }
    .logo {
      width: 240px;
      height: 240px;
      border-radius: 50%;
      border: 14px double var(--neon-blue);
      box-shadow: 0 0 90px rgba(0,240,255,0.95);
      margin-bottom: 25px;
    }
    h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 3.6em;
      background: linear-gradient(90deg, var(--neon-blue), #ffffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 12px;
    }
    .tagline {
      font-size: 1.65em;
      color: #a0f0ff;
      margin-bottom: 60px;
    }
    .card {
      background: rgba(5, 25, 60, 0.96);
      border: 2px solid var(--neon-blue);
      border-radius: 28px;
      padding: 38px 28px;
      margin: 32px 0;
      box-shadow: 0 25px 70px rgba(0,240,255,0.3);
    }
    .btn {
      background: linear-gradient(135deg, var(--neon-blue), var(--accent));
      color: #000;
      border: none;
      padding: 22px;
      border-radius: 55px;
      font-size: 1.55em;
      font-weight: 700;
      width: 100%;
      margin: 16px 0;
      box-shadow: 0 15px 50px rgba(0,240,255,0.5);
      transition: transform 0.2s;
    }
    .btn:active { transform: scale(0.95); }
    .game-container {
      background: #001122;
      border: 6px solid var(--neon-blue);
      border-radius: 24px;
      height: 400px;
      position: relative;
      overflow: hidden;
      margin-top: 25px;
    }
    .panda {
      position: absolute;
      bottom: 90px;
      left: 70px;
      font-size: 110px;
      transition: bottom 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 2;
    }
    .score {
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 2.4em;
      font-weight: bold;
      color: var(--neon-blue);
      text-shadow: 0 0 20px var(--neon-blue);
      z-index: 10;
    }
  </style>
</head>
<body>

  <div class="header">
    <img src="https://raw.githubusercontent.com/pandoxofficial12-dev/PandoX-Earn-Official-/main/logo-pandox.png" alt="PandoX" class="logo">
    <h1>PandoX</h1>
    <p class="tagline">Reclama • Compite • Gana PDX</p>
  </div>

  <div class="card">
    <h2 style="text-align:center;color:var(--neon-blue);margin-bottom:30px;">Wallet</h2>
    <button id="connectBtn" class="btn">Conectar Wallet</button>
    <button id="claimBtn" class="btn" disabled>Reclamar PDX</button>
  </div>

  <div class="card">
    <p style="text-align:center;font-size:17px;line-height:1.9;color:var(--neon-blue);">
      🏆 Todos los domingos 8:00 PM (UTC-5)<br><br>
      Ranking Puntos PDX: 1° 80.000 • 2° 40.000 • 3° 25.000 PDX<br>
      Ranking Panda Runner: 1° 400.000 • 2° 200.000 • 3° 80.000 PDX<br><br>
      <strong>Mínimo 50 entradas pagadas</strong>
    </p>
  </div>

  <div class="card">
    <h2 style="text-align:center;color:var(--neon-blue);margin-bottom:30px;">🐼 Panda Runner</h2>
    <div style="display:flex;gap:18px;justify-content:center;margin-bottom:25px;">
      <button id="practiceBtn" class="btn" style="flex:1;">Practicar Gratis</button>
      <button id="paidBtn" class="btn" style="flex:1;">Competir (0.5 WLD)</button>
    </div>

    <div class="game-container" id="gameContainer">
      <div class="score" id="scoreDisplay">Score: 0</div>
      <div id="panda" class="panda">🐼</div>
      <div id="gameInfo" style="position:absolute;bottom:20px;left:0;right:0;text-align:center;color:#88eeff;font-size:1.2em;">
        Toca la pantalla para saltar
      </div>
    </div>
  </div>

<script>
// Wallet connection
let walletAddress = '';
document.getElementById('connectBtn').addEventListener('click', async () => {
  if (typeof MiniKit === 'undefined') return alert('Abre la app en World App');
  try {
    const { finalPayload } = await MiniKit.commandsAsync.walletAuth({ nonce: Math.random().toString(36) });
    if (finalPayload.status === 'success') {
      walletAddress = MiniKit.walletAddress;
      document.getElementById('connectBtn').style.display = 'none';
      document.getElementById('claimBtn').disabled = false;
      alert('✅ Wallet conectada correctamente');
    }
  } catch(e) { alert('Error al conectar wallet'); }
});
document.getElementById('claimBtn').addEventListener('click', () => alert('¡PDX reclamado con éxito!'));

// Simple & Smooth Panda Runner
let score = 0;
let isJumping = false;
const panda = document.getElementById('panda');
const scoreDisplay = document.getElementById('scoreDisplay');
const gameContainer = document.getElementById('gameContainer');

function jump() {
  if (isJumping) return;
  isJumping = true;
  panda.style.bottom = '210px';
  setTimeout(() => {
    panda.style.bottom = '90px';
    isJumping = false;
  }, 420);
}

gameContainer.addEventListener('touchstart', (e) => {
  e.preventDefault();
  jump();
  score += 12;
  scoreDisplay.textContent = `Score: ${score}`;
});

document.getElementById('practiceBtn').addEventListener('click', () => {
  score = 0;
  scoreDisplay.textContent = 'Score: 0';
  alert('🎮 Modo Práctica activado\nToca la pantalla para saltar');
});

document.getElementById('paidBtn').addEventListener('click', () => {
  if (!walletAddress) return alert('Conecta tu wallet primero');
  score = 0;
  scoreDisplay.textContent = 'Score: 0';
  alert('🏆 Modo Competir activado (0.5 WLD)');
});
</script>
</body>
</html>
