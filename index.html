<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PandoX - Earn PDX</title>
  <script src="https://cdn.jsdelivr.net/npm/@worldcoin/minikit-js@latest/dist/index.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/supabase.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(to bottom, #000022, #000000);
      color: white;
      padding: 20px;
      margin: 0;
      min-height: 100vh;
    }
    h1 { color: #00ffff; text-shadow:0 0 15px #00ffff,0 0 30px #00ffff; font-size:3em; margin:10px 0; letter-spacing:2px; }
    .logo { width:200px; height:200px; border-radius:50%; border:5px solid #00ffff; box-shadow:0 0 25px #00ffff, inset 0 0 10px #00ffff; margin:30px auto; display:block; }
    .section { margin:40px 0; }
    .buttons { display:flex; flex-wrap:wrap; justify-content:center; }
    .social-btn { background:#00ffff; color:black; border:none; padding:15px 30px; margin:10px; border-radius:50px; font-size:18px; cursor:pointer; box-shadow:0 0 15px #00ffff; text-decoration:none; display:inline-block; font-weight:bold; }
    .earn-btn { background:linear-gradient(#00ffff,#00bfff); color:black; border:none; padding:18px 50px; font-size:22px; margin:20px 10px; border-radius:50px; cursor:pointer; box-shadow:0 0 20px #00ffff; font-weight:bold; text-transform:uppercase; }
    .earn-btn:disabled { background:#333; box-shadow:none; color:#666; }
    #status { margin-top:40px; font-size:20px; color:#00ffff; text-shadow:0 0 10px #00ffff; }
    .subtitle { font-size:1.4em; margin:15px 0; color:#80ffff; }
    #ranking { margin-top:30px; font-size:18px; }
  </style>
</head>
<body>

  <img src="https://raw.githubusercontent.com/pandoxofficial12-dev/PandoX-Earn-Official-/main/logo-pandox.png" alt="PandoX Logo" class="logo">

  <h1>¡Earn PandoX (PDX)!</h1>
  <p class="subtitle">Conecta tu wallet en World App y reclama recompensas en PDX.</p>

  <div class="section">
    <h2>Únete a la comunidad PandoX</h2>
    <div class="buttons">
      <a href="https://x.com/pandoxofficial" target="_blank" class="social-btn">X Oficial</a>
      <a href="https://t.me/pandoxofficial" target="_blank" class="social-btn">Telegram Grupo</a>
      <a href="https://t.me/pandoxchannel" target="_blank" class="social-btn">Canal Telegram</a>
      <a href="https://worldscan.org/address/0xF968341A687D70BcF84121111CfBB5eF7148AC28" target="_blank" class="social-btn">Contrato PDX</a>
    </div>
  </div>

  <div class="section">
    <h2>Gana PDX</h2>
    <p class="subtitle">Conecta wallet para registrarte y reclama tus PDX.</p>
    <button id="subscribeBtn" class="earn-btn">Conectar Wallet / Registrarse</button>
    <button id="claimBtn" class="earn-btn" disabled>Claim Reward</button>
    <button id="viewBalanceBtn" class="earn-btn" disabled>Ver Saldo / Posición</button>
    <div id="status">Abre esta mini-app en World App para conectar y ganar PDX.</div>
    <div id="ranking"></div>
  </div>

<script>
  // ----- Configuración Supabase -----
  const supabaseUrl = 'https://jboiwiedvugsfbxzgkzd.supabase.co';
  const supabaseKey = 'sb_publishable_8FrWUMtLwxEcgvDl-sx9CA_xpSpY2-M';
  const supabase = supabase.createClient(supabaseUrl, supabaseKey);

  const subscribeBtn = document.getElementById('subscribeBtn');
  const claimBtn = document.getElementById('claimBtn');
  const viewBalanceBtn = document.getElementById('viewBalanceBtn');
  const status = document.getElementById('status');
  const rankingDiv = document.getElementById('ranking');

  let walletAddress = null;
  let lastClaim = 0;
  const claimInterval = 6*60*60*1000; // 6h en ms
  const welcomeReward = 5;
  const recurringReward = 2;
  let userPoints = 0;

  // MiniKit check
  if(typeof MiniKit !== 'undefined' && MiniKit.isInstalled()) {
    status.textContent = '¡MiniKit listo! Conecta tu wallet para empezar.';
  } else {
    status.textContent = 'Abre desde World App para funciones reales.';
  }

  async function updateRanking() {
    const { data } = await supabase
      .from('claims')
      .select('wallet, points')
      .order('points', { ascending:false })
      .limit(10);
    rankingDiv.innerHTML = '<b>Top 10:</b><br>' + data.map((u,i)=>`${i+1}. ${u.wallet.slice(0,6)}...${u.wallet.slice(-4)} - ${u.points} pts`).join('<br>');
  }

  async function checkOrCreateUser() {
    const { data, error } = await supabase
      .from('claims')
      .select('*')
      .eq('wallet', walletAddress)
      .single();

    if(data) {
      lastClaim = new Date(data.last_claim || 0).getTime();
      userPoints = data.points || 0;
    } else {
      await supabase.from('claims').insert([
        { wallet: walletAddress, last_claim: null, points: welcomeReward }
      ]);
      lastClaim = 0;
      userPoints = welcomeReward;
      alert(`¡Bienvenido! Has recibido ${welcomeReward} PDX de regalo.`);
    }
    claimBtn.disabled = false;
    viewBalanceBtn.disabled = false;
    updateRanking();
  }

  subscribeBtn.onclick = async () => {
    if(!MiniKit || !MiniKit.isInstalled()) {
      status.textContent = 'Error: Abre la mini-app directamente en World App.';
      return;
    }
    try {
      const result = await MiniKit.commandsAsync.walletAuth({});
      if(result.finalPayload.status==='success') {
        walletAddress = MiniKit.walletAddress;
        status.textContent = `¡Conectado! Wallet: ${walletAddress.slice(0,6)}...${walletAddress.slice(-4)}`;
        subscribeBtn.disabled = true;
        subscribeBtn.textContent = '¡Conectado!';
        await checkOrCreateUser();
      } else {
        status.textContent='Conexión cancelada.';
      }
    } catch(err) {
      status.textContent='Error al conectar: '+(err.message||'Intenta de nuevo');
    }
  };

  claimBtn.onclick = async () => {
    if(!walletAddress) { status.textContent='Primero conecta tu wallet.'; return; }
    const now = Date.now();
    if(now - lastClaim < claimInterval) {
      const remain = Math.ceil((claimInterval - (now-lastClaim))/1000/60);
      alert(`Debes esperar ${remain} minutos para reclamar nuevamente.`);
      return;
    }
    try {
      const payload = {
        reference:'pandoX-earn-'+Date.now(),
        tokens:[{ address:'0xF968341A687D70BcF84121111CfBB5eF7148AC28', amount:'200000000000000000' }],
        to: walletAddress,
        description:'Recompensa Earn PandoX'
      };
      const response = await MiniKit.commandsAsync.pay(payload);
      if(response.finalPayload.status==='success') {
        lastClaim = now;
        userPoints += recurringReward;
        await supabase.from('claims').update({
          last_claim: new Date().toISOString(),
          points: userPoints
        }).eq('wallet', walletAddress);
        alert(`¡Éxito! ${recurringReward} PDX enviados. Total puntos: ${userPoints}`);
        updateRanking();
      } else {
        status.textContent='Transacción cancelada o fallida.';
      }
    } catch(err) {
      status.textContent='Error en claim: '+(err.message||'Verifica saldo en wallet o permisos');
    }
  };

  viewBalanceBtn.onclick = async () => {
    const { data } = await supabase.from('claims').select('points').eq('wallet', walletAddress).single();
    status.textContent = `Saldo PDX: ${userPoints} pts (revisar Puff Wallet para token real)`;
  };
</script>
</body>
</html>
